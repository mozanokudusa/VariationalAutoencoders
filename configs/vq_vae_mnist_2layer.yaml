model:
  name: "vq_vae"              # Triggers the VQVAE build in __init__.py
  input_channels: 1
  image_size: 32
  capacity: 32                # Equivalent to hidden_channels
  num_embeddings: 512         # The size of the codebook dictionary
  embedding_dim: 64           # The vector size for each code
  commitment_cost: 0.25       # Balances the encoder/codebook learning rates

training:
  dataset: "mnist"
  batch_size: 128
  epochs: 50
  learning_rate: 0.0005       # VQ-VAEs often prefer a slightly lower LR
  num_workers: 4