model:
  name: "vq_vae"              # Triggers the VQVAE build in __init__.py
  input_channels: 3
  image_size: 32
  capacity: 128               # Equivalent to hidden_channels
  num_embeddings: 512         # The size of the codebook dictionary
  embedding_dim: 128           # The vector size for each code
  commitment_cost: 0.25      # Balances the encoder/codebook learning rates

training:
  dataset: "cifar10"
  batch_size: 128
  epochs: 100
  learning_rate: 0.0001       # VQ-VAEs often prefer a slightly lower LR
  num_workers: 4