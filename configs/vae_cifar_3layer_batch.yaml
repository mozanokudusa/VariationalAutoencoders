model:
  name: "variational_autoencoder"
  encoder_type: "conv3"
  decoder_type: "conv3"
  input_channels: 3
  image_size: 32
  capacity: 64
  latent_dims: 128
  variational_beta: 0.1

training:
  dataset: "cifar10"
  batch_size: 32
  epochs: 100
  kl_warmup_epochs: 20
  learning_rate: 0.0005
  num_workers: 4